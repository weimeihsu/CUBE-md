<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colors — Design System</title>
  <link rel="stylesheet" href="styles.css">
  <script src="tailwind.config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans bg-gray-100 text-gray-900 text-sm leading-normal pt-14">

<nav></nav>
<script src="nav.js"></script>

<main class="max-w-page mx-auto px-8 py-10">
  <div class="mb-10">
    <h1 class="text-32 font-bold text-gray-900 leading-tight mb-2">Color Palette</h1>
    <p class="text-base text-gray-600">Primitive collection · 6 color sets · 68 tokens · All bound to Figma variables</p>
    <a class="inline-flex items-center gap-1.5 mt-5 px-3.5 py-2 text-13 font-bold text-gray-900 bg-white border-1.5 border-gray-150 rounded-md no-underline transition-colors duration-150 hover:bg-gray-150 hover:border-gray-300 cursor-pointer" href="doc/color-palette.md" download="color-palette.md" onclick="handleDownload(event,this)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      color-palette.md
    </a>
  </div>

  <script>
    const palette = {
      blue:   {100:'#E9F6FE',150:'#CAECFF',200:'#AAE1FF',300:'#67C7FB',400:'#35ADED',500:'#1890D2',600:'#0C76B0',700:'#076193',800:'#044D75',900:'#033A59',1000:'#02293D'},
      green:  {100:'#E9F8F0',150:'#CBEFDC',200:'#ADE6C7',300:'#6ED09B',400:'#3BB875',500:'#1D9C58',600:'#0F8144',700:'#0A6A36',800:'#06542A',900:'#044020',1000:'#032C16'},
      purple: {100:'#F3F4FF',150:'#E3E6FF',200:'#D3D7FF',300:'#B2B8FF',400:'#929BFE',500:'#757EEC',600:'#5E66CC',700:'#4C53AC',800:'#3C418A',900:'#2D3169',1000:'#1F2249'},
      red:    {100:'#FDF2F2',150:'#FCE1E1',200:'#FACFCF',300:'#F7A9A9',400:'#F38282',500:'#EC5555',600:'#DD1B1B',700:'#BC0000',800:'#970000',900:'#750000',1000:'#550000'},
      orange: {100:'#FFF3E6',150:'#FFE2C2',200:'#FFD19D',300:'#FFAB50',400:'#F28815',500:'#D56C00',600:'#B25700',700:'#944600',800:'#763700',900:'#592A00',1000:'#3F1D00'},
      gray:   {0:'#FFFFFF',100:'#F5F5F5',150:'#E7E7E7',200:'#D9D9D9',300:'#BDBDBD',400:'#A3A3A3',500:'#898989',600:'#707070',700:'#5C5C5C',800:'#494949',900:'#373737',1000:'#262626',1100:'#000000'}
    };
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('palette');
      Object.entries(palette).forEach(([group, shades]) => {
        const section = document.createElement('div');
        section.className = 'mb-8';
        section.innerHTML = `<div class="text-xs font-bold capitalize tracking-md text-gray-600 mb-3">${group}</div>`;
        const row = document.createElement('div');
        row.className = 'flex flex-wrap gap-3';
        Object.entries(shades).forEach(([weight, hex]) => {
          const needsBorder = ['#FFFFFF','#F5F5F5','#E7E7E7','#F3F4FF','#FDF2F2','#FFF3E6','#E9F6FE','#E9F8F0','#E3E6FF','#CAECFF','#FCE1E1','#FFE2C2'].includes(hex);
          row.innerHTML += `
            <div class="flex flex-col gap-2 items-center" style="width:66px">
              <span class="text-11 text-gray-900 whitespace-nowrap">${group}${weight}</span>
              <div class="w-14 h-14 rounded border border-black/6" style="background:${hex};${needsBorder?'border-color:#E7E7E7;':''}"></div>
              <span class="text-11 text-gray-600 font-mono">${hex}</span>
            </div>`;
        });
        section.appendChild(row);
        container.appendChild(section);
      });
    });
  </script>

  <div id="palette"></div>
</main>

<script src="downloads.js"></script>
<script src="main.js"></script>
</body>
</html>
